apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  labels:
    app: payment-service
spec:
  replicas: 3 # ADR-010: Scalability - multiple replicas for high availability
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: your-registry/payment-service:1.0.0 # ADR-010: Docker Image Standards - replace with actual image
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: payment-service-config # ADR-013: Non-Sensitive Configuration via ConfigMap
            - secretRef:
                name: payment-service-secrets # ADR-013: Secrets Management via Kubernetes Secret (integrated with Vault)
          resources: # ADR-010: Resource Limits and Requests
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1024Mi"
              cpu: "1000m"
          livenessProbe: # ADR-010: Liveness Probes
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe: # ADR-010: Readiness Probes
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Optional: Volume mount for Vault Agent Injector for dynamic secrets (ADR-013)
          # volumeMounts:
          #   - name: vault-secrets
          #     mountPath: /vault/secrets
          #     readOnly: true
      # Optional: Volumes for Vault Agent Injector (ADR-013)
      # volumes:
      #   - name: vault-secrets
      #     emptyDir:
      #       medium: Memory
      # serviceAccountName: payment-service-sa # If using Kubernetes Service Account for Vault Auth
      # annotations:
      #   vault.hashicorp.com/agent-inject: "true"
      #   vault.hashicorp.com/role: "payment-service"
      #   vault.hashicorp.com/agent-inject-secret-db-creds.txt: "database/creds/payment-service"
      #   vault.hashicorp.com/agent-inject-template-db-creds.txt: |
      #     {{- with secret "database/creds/payment-service" -}}
      #     spring.datasource.username={{ .Data.username }}
      #     spring.datasource.password={{ .Data.password }}
      #     {{- end -}}
