apiVersion: v1
kind: Secret
metadata:
  name: payment-service-secrets # ADR-013: Secrets Management via Kubernetes Secret (integrated with Vault)
  labels:
    app: payment-service
type: Opaque
stringData:
  # IMPORTANT: In a real-world scenario with HashiCorp Vault (ADR-013),
  # these secrets would NOT be hardcoded here.
  # Instead, the Kubernetes Secret would be populated dynamically by:
  # 1. A Vault Agent Injector (as commented out in deployment.yaml)
  # 2. An external secrets operator (e.g., External Secrets Operator)
  # 3. Manual injection from Vault CLI/UI for testing purposes
  # This file serves as a placeholder to show the Secret resource exists.

  # Example: Database credentials (would come from Vault dynamic secrets)
  db-username: "placeholder-db-user"
  db-password: "placeholder-db-password"

  # Example: Kafka API Key (would come from Vault)
  kafka-api-key: "placeholder-kafka-api-key"
  kafka-api-secret: "placeholder-kafka-api-secret"

  # Example: External service API key (would come from Vault)
  fraud-detection-api-key: "placeholder-fraud-api-key"
