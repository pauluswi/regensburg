apiVersion: v1
kind: Service
metadata:
  name: payment-service
  labels:
    app: payment-service
spec:
  selector:
    app: payment-service
  ports:
    - protocol: TCP
      port: 80 # Internal cluster port
      targetPort: 8080 # Port the container is listening on
  type: ClusterIP # ADR-010: Default service type for internal communication
