name: Payment Service CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-unit-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 # ADR-001: Java Version
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven & Run Unit Tests # ADR-017: CI Stage - Build & Unit Test, ADR-014: Unit Testing
        run: mvn -B clean install -DskipTests

      - name: Run Unit Tests # Separate step for clarity, can be combined
        run: mvn -B test

      - name: Archive Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: target/surefire-reports

  build-and-push-docker-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-unit-test # Depends on successful build and unit tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' # Only push for main/develop branches
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Log in to Docker Hub # ADR-010: Docker Image Standards - Push to registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Docker image # ADR-010: Docker Image Standards
        run: docker build -t regensburg/payment-service:${{ github.sha }} .

      - name: Push Docker image
        run: docker push regensburg/payment-service:${{ github.sha }}

      - name: Tag and Push 'latest' (for develop/main)
        if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
        run: |
          docker tag regensburg/payment-service:${{ github.sha }} regensburg/payment-service:latest
          docker push regensburg/payment-service:latest

  integration-and-contract-tests:
    name: Integration & Contract Tests
    runs-on: ubuntu-latest
    needs: build-and-push-docker-image # Depends on image being built
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Integration Tests # ADR-014: Integration Testing
        run: mvn -B verify -Pintegration-tests # Assuming a Maven profile for integration tests

      - name: Run Contract Tests # ADR-014: Contract Testing (e.g., Pact)
        run: mvn -B verify -Pcontract-tests # Assuming a Maven profile for contract tests

      - name: Archive Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-contract-test-results
          path: target/failsafe-reports

  deploy-to-dev:
    name: Deploy to Dev Environment
    runs-on: ubuntu-latest
    needs: integration-and-contract-tests # Depends on successful tests
    environment: development # GitHub Environments for protection rules
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Kubeconfig # Configure kubectl to connect to your K8s cluster
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG_DEV }} # Kubeconfig stored as a GitHub Secret

      - name: Deploy to Kubernetes Dev # ADR-010: Containerization & Deployment, ADR-017: CD Stage
        run: |
          # Replace placeholder image with the one just built
          sed -i "s|your-registry/payment-service:1.0.0|regensburg/payment-service:${{ github.sha }}|g" k8s-manifests/payment-service-deployment.yaml
          
          # Apply Kubernetes manifests
          kubectl apply -f k8s-manifests/payment-service-configmap.yaml
          kubectl apply -f k8s-manifests/payment-service-secret.yaml # Placeholder, actual secrets from Vault
          kubectl apply -f k8s-manifests/payment-service-service.yaml
          kubectl apply -f k8s-manifests/payment-service-deployment.yaml
          kubectl apply -f k8s-manifests/payment-service-ingress.yaml

      - name: Verify Deployment
        run: kubectl rollout status deployment/payment-service -n default # Or your specific namespace
