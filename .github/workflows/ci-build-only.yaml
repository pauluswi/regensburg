name: Payment Service CI (Build Only)

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-unit-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven & Run Unit Tests
        run: mvn -B clean install

      - name: Display Success Message
        run: echo "CI Build and Unit Tests completed successfully! No deployment performed as this is a showcase."
